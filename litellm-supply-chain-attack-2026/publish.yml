# .github/workflows/publish.yml
# Publish to PyPI using OIDC Trusted Publishers — no long-lived API tokens stored.
#
# This pattern would have PREVENTED the LiteLLM supply chain attack:
# even with stolen CI environment variables, an attacker cannot publish
# to PyPI without a valid OIDC assertion from this exact workflow run.
#
# Setup: Configure a Trusted Publisher on PyPI for your project first:
# https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#
# Reference: https://aistackinsights.ai/blog/litellm-supply-chain-attack-2026

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }}

    permissions:
      id-token: write   # REQUIRED for OIDC trusted publisher
      # No api_token or secret needed — PyPI mints a short-lived token
      # via OIDC that is only valid for 15 minutes and tied to this run.

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI via OIDC (no stored credentials)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password or token parameter — OIDC handles authentication.
        # The attacker would need to control THIS workflow + PyPI publisher
        # config simultaneously. Stealing env vars alone is insufficient.
